<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1e2540" />
      <stop offset="100%" stop-color="#0c0f1d" />
    </radialGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e0b5" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#aa7c11" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  <!-- Outer border -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#gold-grad)" stroke-width="4" opacity="0.3" />
  
  <!-- Central banquet table -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="url(#gold-grad)" stroke-width="8" />
  <circle cx="256" cy="256" r="80" fill="url(#gold-grad)" opacity="0.15" />
  
  <!-- Seats (8 plates/seats around the table) -->
  <!-- 0 deg (Top) -->
  <circle cx="256" cy="116" r="24" fill="url(#gold-grad)" />
  <!-- 45 deg -->
  <circle cx="355" cy="157" r="24" fill="url(#gold-grad)" />
  <!-- 90 deg (Right) -->
  <circle cx="396" cy="256" r="24" fill="url(#gold-grad)" />
  <!-- 135 deg -->
  <circle cx="355" cy="355" r="24" fill="url(#gold-grad)" />
  <!-- 180 deg (Bottom) -->
  <circle cx="256" cy="396" r="24" fill="url(#gold-grad)" />
  <!-- 225 deg -->
  <circle cx="157" cy="355" r="24" fill="url(#gold-grad)" />
  <!-- 270 deg (Left) -->
  <circle cx="116" cy="256" r="24" fill="url(#gold-grad)" />
  <!-- 315 deg -->
  <circle cx="157" cy="157" r="24" fill="url(#gold-grad)" />

  <!-- Center icon decoration: QR style fork & knife / grid -->
  <path d="M246 226h20v60h-20zM226 246h60v20h-60z" fill="url(#gold-grad)" />
</svg>
